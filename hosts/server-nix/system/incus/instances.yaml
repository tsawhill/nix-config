OPNSense:
  type: "virtual-machine"
  profiles: ["default"]
  config:
    boot.autostart: "true"
    boot.autostart.delay: "5"
    boot.autostart.priority: "100"
    limits.cpu: "4"
    limits.memory: "8GiB"
    raw.qemu: "-cpu host"
  devices:
    root: { type: "disk", path: "/", pool: "rpool", size: "16GiB" }
    lan0: { type: "nic", nictype: "bridged", parent: "br0", hwaddr: "14:29:0d:71:37:00" }
    wan0: { type: "nic", nictype: "bridged", parent: "br1", hwaddr: "14:29:0d:71:37:01" }

