creation_rules:
  ##############################################################################
  #
  #                             SSH client keys
  #
  ##############################################################################
  - path_regex: modules/secrets/ssh/client_keys/build-nix\.yaml$
    key_groups:
      - age:
        - *build
  - path_regex: modules/secrets/ssh/client_keys/acme-nix\.yaml$
    key_groups:
      - age:
        - *build
        - *acme
  - path_regex: modules/secrets/ssh/client_keys/laptop-nix\.yaml$
    key_groups:
      - age:
        - *build
        - *laptop
  - path_regex: modules/secrets/ssh/client_keys/syncoid-pi-backup\.yaml$
    key_groups:
      - age:
        - *build
        - *server
  ##############################################################################
  #
  #                             WireGuard keys
  #
  ##############################################################################
  - path_regex: modules/secrets/wireguard/pi-backup-nix\.yaml$
    key_groups:
      - age:
        - *build
        - *pi_backup
  ##############################################################################
  #
  #                             Samba account credentials
  #
  ##############################################################################
  - path_regex: modules/secrets/server/LXCs/samba/immobile0783\.yaml$
    key_groups:
      - age:
        - *build
        - *samba
        - *desktop
  ##############################################################################
  #
  #                             Gotify tokens
  #
  ##############################################################################
  - path_regex: modules/secrets/server/LXCs/gotify_token_zfs\.yaml$
    key_groups:
      - age:
        - *build
        - *server
  ##############################################################################
  #
  #                             Github access token
  #
  ##############################################################################
