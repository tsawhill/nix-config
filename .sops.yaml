    key_groups:
      - age:
        - *build
  ##############################################################################
  #
  #                             SMTP passwords
  #
  ##############################################################################
  ##############################################################################
  #
  #                             Syncthing cert/key pairs
  #
  ##############################################################################
  - path_regex: modules/secrets/syncthing/desktop-nix\.yaml$
    key_groups:
      - age:
        - *build
        - *desktop
  ##############################################################################
